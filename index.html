<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>《碳息生存戰》V4 玻璃感系統</title>
    <style>
        :root {
            /* 玻璃質感配色 */
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-main: #ffffff;
            --money-val: #f1c40f;
            --cf-val: #ff4d4d;
            --primary: #3498db;
            --success: #2ecc71;
            --warning: #e67e22;
        }
        
        body {
            font-family: 'PingFang TC', 'Arial', sans-serif;
            margin: 0; padding: 0;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            background-color: #222;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* 杜拜背景 */
        #background-view {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            overflow: hidden;
        }
        
        .bg-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s ease;
        }
        #bg-sunny { background-image: url('image_0.png'); opacity: 1; z-index: -3; }
        #bg-rainy { background-image: url('image_1.png'); opacity: 0; z-index: -2; }

        #rain-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; opacity: 0; transition: opacity 1.5s ease; pointer-events: none;
        }
        .rain {
            position: absolute; background-color: rgba(255, 255, 255, 0.4);
            width: 1.5px; height: 25px; animation: rainDrop 0.8s infinite linear;
        }
        @keyframes rainDrop { to { transform: translateY(100vh); } }

        /* 玻璃面板通用樣式 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .screen { display: none; width: 100%; height: 100%; box-sizing: border-box; flex-direction: column; align-items: center; text-align: center; position: relative; }
        .active-screen { display: flex; }

        h1 { margin: 30px 0 10px 0; font-size: 36px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); font-weight: 900; letter-spacing: 2px; }
        .sub { color: #f0f0f0; margin-bottom: 30px; font-size: 15px; background: rgba(255,255,255,0.1); padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }

        button {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.8), rgba(41, 128, 185, 0.8));
            color: white; border: 1px solid rgba(255,255,255,0.2); padding: 16px 24px; font-size: 18px; font-weight: bold;
            border-radius: 16px; cursor: pointer; width: 80%; max-width: 280px; margin: 10px 0; transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        button:active { transform: scale(0.95); }
        button.btn-alt { background: rgba(0,0,0,0.3); }
        button.btn-success { background: linear-gradient(135deg, rgba(46, 204, 113, 0.8), rgba(39, 174, 96, 0.8)); }

        /* 返回首頁按鈕 */
        .home-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; background: rgba(255,255,255,0.2); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid var(--glass-border); z-index: 10; }

        /* 抽選區優化 (單張卡片) */
        .single-card-zone { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .draw-card {
            width: 220px; height: 320px; perspective: 1000px; position: relative;
            transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .draw-card.spinning { animation: spin3D 0.5s infinite linear; }
        .draw-card.flipped { transform: rotateY(180deg); }

        @keyframes spin3D { 
            0% { transform: rotateY(0deg) rotateX(0deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }

        .card-face {
            position: absolute; width: 100%; height: 100%; border-radius: 20px;
            backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 2px solid var(--glass-border); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .card-back { background: linear-gradient(135deg, #333, #111); font-size: 80px; color: var(--primary); }
        .card-front { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); transform: rotateY(180deg); padding: 20px; }
        .card-front .icon { font-size: 80px; margin-bottom: 15px; }
        .card-front .name { font-size: 24px; font-weight: bold; }

        /* 遊戲概覽列 */
        #screen-game { justify-content: flex-start; padding-top: 70px; overflow-y: auto; }
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; padding: 15px; width: 100%; box-sizing: border-box; }
        .p-card {
            padding: 15px; text-align: left; transition: 0.2s; cursor: pointer;
            border: 1px solid var(--glass-border);
        }
        .p-card.eliminated { opacity: 0.3; filter: grayscale(1); }
        .p-card .p-name { font-weight: bold; font-size: 16px; margin-bottom: 8px; display: flex; align-items: center; }
        .p-card .p-val { font-size: 18px; font-weight: bold; margin: 4px 0; }
        .p-card .val-money { color: var(--money-val); }
        .p-card .val-cf { color: var(--cf-val); }

        /* 底部操作彈窗 */
        #bottom-panel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70%;
            background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border); z-index: 100;
            display: none; flex-direction: column; padding: 25px; box-sizing: border-box;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            border-top-left-radius: 30px; border-top-right-radius: 30px;
        }
        #bottom-panel.active { display: flex; transform: translateY(0); }
        .panel-close { position: absolute; top: 20px; right: 25px; font-size: 28px; color: #aaa; }

        .input-group { margin: 20px 0; display: flex; justify-content: center; }
        input[type="number"] { width: 90%; padding: 15px; font-size: 28px; text-align: center; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.1); color: #fff; font-weight: bold; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px; margin: 0 auto; }
        .btn-panel { font-size: 16px; padding: 15px; margin: 0; }

        /* 規則與特效層 */
        #rule-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 200; display: none; overflow-y: auto; padding: 30px; box-sizing: border-box; }
        #rule-overlay.active { display: block; }
        #fx-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999; display: none; justify-content: center; align-items: center; }

        /* 動畫 */
        @keyframes stamp { 0% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .jail-text { font-size: 60px; color: red; font-weight: 900; animation: stamp 0.5s forwards; }
        .skull { font-size: 100px; animation: stamp 0.8s infinite alternate; }
    </style>
</head>
<body>

    <div id="background-view">
        <div id="bg-sunny" class="bg-img"></div>
        <div id="bg-rainy" class="bg-img"></div>
        <div id="rain-container"></div>
    </div>

    <div id="fx-layer"></div>

    <div id="screen-cover" class="screen active-screen">
        <h1>🌍 碳息生存戰</h1>
        <div class="sub">V4 玻璃感終極平衡版</div>
        <button onclick="startGameSound(); switchScreen('screen-setup')">開始遊戲</button>
        <button class="btn-alt" onclick="openRules()">遊戲規則</button>
    </div>

    <div id="screen-setup" class="screen">
        <div class="home-btn" onclick="switchScreen('screen-cover')">🏠</div>
        <h1>選擇人數</h1>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; width:100%;">
            <select id="player-count" style="width:80%; max-width:300px; align-self:center; padding:15px; font-size:20px; border-radius:12px; background:rgba(255,255,255,0.1); color:#fff; border:1px solid var(--glass-border); outline:none; margin-bottom:20px;">
                <option value="2">2 人</option>
                <option value="3">3 人</option>
                <option value="4" selected>4 人</option>
            </select>
            <button style="align-self:center;" onclick="initDraw()">確認並抽選角色</button>
        </div>
    </div>

    <div id="screen-draw" class="screen">
        <h1 id="draw-title">玩家 1 抽選</h1>
        <div class="single-card-zone">
            <div id="main-draw-card" class="draw-card" onclick="startSpinAnimation()">
                <div class="card-face card-back">❓</div>
                <div class="card-face card-front" id="card-front-content"></div>
            </div>
            <p id="draw-hint" style="margin-top:20px; color:#aaa;">點擊卡片開始命運旋轉</p>
            <button id="draw-next-btn" style="display:none;" onclick="prepareNextDraw()">下一位</button>
            <button id="draw-start-game-btn" style="display:none;" class="btn-success" onclick="goToGame()">正式開始遊戲</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="home-btn" onclick="confirmBackHome()">🏠</div>
        <div class="status-grid" id="status-grid"></div>
        
        <div class="sub" id="weather-bar" style="margin-top:20px; width:85%; max-width:400px;">🟢 氣候良好</div>
        <button class="btn-alt" onclick="openRules()">查看規則</button>
    </div>

    <div id="bottom-panel">
        <div class="panel-close" onclick="closeBottomPanel()">✕</div>
        <div id="p-panel-info" style="text-align:left; margin-bottom:20px;">
            <div style="font-size:24px; font-weight:bold;"><span id="p-panel-icon"></span> 玩家 <span id="p-panel-num"></span></div>
            <div id="p-panel-role" style="color:var(--primary); font-size:18px; margin:5px 0;"></div>
            <div id="p-panel-skill" style="font-size:14px; color:#bbb; min-height:40px; background:rgba(255,255,255,0.05); padding:8px; border-radius:8px;"></div>
        </div>
        <div class="input-group">
            <input type="number" id="val-input" placeholder="輸入數字" inputmode="numeric">
        </div>
        <div class="btn-grid">
            <button class="btn-panel btn-success" onclick="modifyStat('money', 1)">💰 加錢</button>
            <button class="btn-panel btn-alt" onclick="modifyStat('money', -1)">💰 扣錢</button>
            <button class="btn-panel" style="background:#e74c3c;" onclick="modifyStat('cf', 1)">🏭 加碳</button>
            <button class="btn-panel" style="background:#c0392b;" onclick="modifyStat('cf', -1)">🌱 減碳</button>
        </div>
        <div id="special-skill-zone" style="margin-top:15px; display:none;">
            <button class="btn-success" style="width:100%; max-width:400px;" onclick="usePhilanthropist()">🌱 發動【綠色募款】(-$300, -500CF)</button>
        </div>
    </div>

    <div id="rule-overlay">
        <div style="text-align:right;"><button class="btn-alt" style="width:60px;" onclick="closeRules()">✕</button></div>
        <h2 style="color:var(--primary);">📜 碳息生存戰 V3 完整規則</h2>
        <div style="text-align:left; font-size:14px; line-height:1.6; color:#ccc;">
            <p>1. <b>淘汰條件：</b>碳排(CF)達 10,000 即出局。</p>
            <p>2. <b>環保局軌道A：</b>首次達 7,000 CF 入獄，可付$200減500CF。</p>
            <p>3. <b>工廠系統：</b>Level 1~3 地主加碳加錢，路人踩中加碳。</p>
            <p>4. <b>角色技能：</b>老百姓減傷、明星干擾、黑人高機動、慈善家募款、企業家高風險擴張。</p>
        </div>
    </div>

    <script>
        // 音效合成器
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            click: () => playTone(800, 'sine', 0.1, 0.3),
            statUp: () => playTone(1200, 'sine', 0.2, 0.2),
            statDown: () => playTone(400, 'sine', 0.3, 0.2),
            spin: () => {
                let count = 0;
                let itv = setInterval(() => {
                    playTone(200 + (count*50), 'square', 0.05, 0.05);
                    count++;
                    if(count > 15) clearInterval(itv);
                }, 100);
            },
            jail: () => {
                playTone(400, 'sawtooth', 0.5, 0.2);
                setTimeout(() => playTone(300, 'sawtooth', 0.5, 0.2), 300);
            },
            death: () => playTone(100, 'triangle', 1, 0.5)
        };

        function startGameSound() { audioCtx.resume(); sounds.click(); }

        // 遊戲數據
        const roleDB = [
            { icon: "👦", name: "老百姓", money: 300, skill: "【理性消費】踩工廠時CF傷-200" },
            { icon: "🌟", name: "曾國城", money: 600, skill: "【明星帶貨】別人踩相鄰+300CF" },
            { icon: "🚴", name: "黑人", money: 400, skill: "【低碳通勤】擲骰5/6時自身-300CF" },
            { icon: "🌱", name: "慈善家", money: 400, skill: "【綠色募款】支付$300減500CF" },
            { icon: "💼", name: "企業家", money: 1000, skill: "【工業污染】每工廠自身+200CF" }
        ];

        let players = [];
        let drawIndex = 0;
        let shuffledRoles = [];
        let activeIdx = 0;

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            sounds.click();
        }

        function openRules() { document.getElementById('rule-overlay').classList.add('active'); sounds.click(); }
        function closeRules() { document.getElementById('rule-overlay').classList.remove('active'); sounds.click(); }

        // 抽選系統
        function initDraw() {
            const count = parseInt(document.getElementById('player-count').value);
            shuffledRoles = [...roleDB].sort(() => Math.random() - 0.5).slice(0, count);
            players = [];
            drawIndex = 0;
            resetCard();
            switchScreen('screen-draw');
        }

        function resetCard() {
            const card = document.getElementById('main-draw-card');
            card.classList.remove('spinning', 'flipped');
            document.getElementById('draw-title').innerText = `玩家 ${drawIndex + 1} 抽選`;
            document.getElementById('draw-hint').style.display = 'block';
            document.getElementById('draw-next-btn').style.display = 'none';
            document.getElementById('draw-start-game-btn').style.display = 'none';
        }

        function startSpinAnimation() {
            const card = document.getElementById('main-draw-card');
            if(card.classList.contains('spinning') || card.classList.contains('flipped')) return;

            card.classList.add('spinning');
            document.getElementById('draw-hint').innerText = "命運旋轉中...";
            sounds.spin();

            setTimeout(() => {
                card.classList.remove('spinning');
                card.classList.add('flipped');
                
                const role = shuffledRoles[drawIndex];
                document.getElementById('card-front-content').innerHTML = `
                    <div class="icon">${role.icon}</div>
                    <div class="name">${role.name}</div>
                `;
                
                players.push({
                    id: drawIndex,
                    role: role,
                    money: role.money,
                    cf: 0,
                    jailedOnce: false,
                    dead: false
                });

                drawIndex++;
                document.getElementById('draw-hint').style.display = 'none';
                
                if(drawIndex < shuffledRoles.length) {
                    document.getElementById('draw-next-btn').style.display = 'block';
                } else {
                    document.getElementById('draw-start-game-btn').style.display = 'block';
                }
            }, 3000);
        }

        function prepareNextDraw() {
            resetCard();
        }

        // 遊戲控制
        function goToGame() {
            renderStatusGrid();
            switchScreen('screen-game');
            updateEnv();
        }

        function renderStatusGrid() {
            const grid = document.getElementById('status-grid');
            grid.innerHTML = '';
            players.forEach((p, idx) => {
                const card = document.createElement('div');
                card.className = `p-card glass-card ${p.dead ? 'eliminated' : ''}`;
                card.innerHTML = `
                    <div class="p-name">${p.role.icon} P${idx+1} ${p.role.name}</div>
                    <div class="p-val val-money">💰 $${p.money}</div>
                    <div class="p-val val-cf">🏭 ${p.cf} CF</div>
                `;
                card.onclick = () => openBottomPanel(idx);
                grid.appendChild(card);
            });
        }

        function openBottomPanel(idx) {
            activeIdx = idx;
            const p = players[idx];
            document.getElementById('p-panel-num').innerText = idx + 1;
            document.getElementById('p-panel-icon').innerText = p.role.icon;
            document.getElementById('p-panel-role').innerText = p.role.name;
            document.getElementById('p-panel-skill').innerText = p.role.skill;
            document.getElementById('val-input').value = "";
            document.getElementById('special-skill-zone').style.display = (p.role.name === "慈善家" && !p.dead) ? 'block' : 'none';
            
            document.getElementById('bottom-panel').classList.add('active');
            sounds.click();
        }

        function closeBottomPanel() {
            document.getElementById('bottom-panel').classList.remove('active');
        }

        function modifyStat(type, dir) {
            const p = players[activeIdx];
            if(p.dead) return;
            const val = parseInt(document.getElementById('val-input').value) || 100;
            
            if(type === 'money') {
                p.money = Math.max(0, p.money + (val * dir));
                dir > 0 ? sounds.statUp() : sounds.statDown();
            } else {
                const old = p.cf;
                p.cf = Math.max(0, p.cf + (val * dir));
                dir > 0 ? sounds.statUp() : sounds.statDown();
                checkLogic(p, old);
            }
            renderStatusGrid();
            updateEnv();
            closeBottomPanel();
        }

        function usePhilanthropist() {
            const p = players[activeIdx];
            if(p.money >= 300) {
                p.money -= 300;
                p.cf = Math.max(0, p.cf - 500);
                playFX('<div class="heal-fx">🌱✨</div>', 1500);
                renderStatusGrid();
                updateEnv();
                closeBottomPanel();
                sounds.statUp();
            }
        }

        function checkLogic(p, old) {
            if(p.cf >= 10000 && !p.dead) {
                p.dead = true;
                playFX('<div class="skull">☠️</div>', 3000);
                sounds.death();
            } else if(p.cf >= 7000 && old < 7000 && !p.jailedOnce) {
                p.jailedOnce = true;
                playFX('<div class="jail-text">🚨 入獄 🚨</div>', 2500);
                sounds.jail();
            }
        }

        function updateEnv() {
            const max = Math.max(...players.filter(p=>!p.dead).map(p=>p.cf), 0);
            const ratio = Math.min(max / 10000, 1);
            document.getElementById('bg-sunny').style.opacity = 1 - ratio;
            document.getElementById('bg-rainy').style.opacity = ratio;
            document.getElementById('rain-container').style.opacity = ratio > 0.3 ? ratio : 0;
            document.getElementById('weather-bar').innerText = ratio > 0.7 ? "🚨 氣候惡劣" : ratio > 0.3 ? "💧 陰雨綿綿" : "🟢 氣候良好";
        }

        function playFX(html, dur) {
            const layer = document.getElementById('fx-layer');
            layer.innerHTML = html;
            layer.style.display = 'flex';
            setTimeout(() => { layer.style.display = 'none'; layer.innerHTML = ''; }, dur);
        }

        function confirmBackHome() {
            if(confirm("確定要返回首頁嗎？目前的遊戲數據將會消失。")) switchScreen('screen-cover');
        }

        // 初始化雨滴
        (function initRain() {
            const container = document.getElementById('rain-container');
            for(let i=0; i<40; i++) {
                const r = document.createElement('div');
                r.className = 'rain';
                r.style.left = Math.random() * 100 + 'vw';
                r.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(r);
            }
        })();
    </script>
</body>
</html>
